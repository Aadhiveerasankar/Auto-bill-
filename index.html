<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Granite Billing</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:6px 0;
font-size:16px;
}

button{
padding:10px 15px;
margin-top:10px;
font-size:16px;
cursor:pointer;
}

.bill{
margin-top:30px;
background:white;
padding:30px;
font-size:22px;
line-height:1.7;
}

.total{
font-size:28px;
font-weight:bold;
color:green;
}

</style>
</head>

<body>

<div class="container">

<h2>Granite Bill Calculator</h2>

<label>Total SFT</label>
<input id="totalsft">

<h3>Materials</h3>

<input id="name1" placeholder="Material name">
<input id="sft1" placeholder="SFT">
<input id="rate1" placeholder="Rate">

<input id="name2" placeholder="Material name">
<input id="sft2" placeholder="SFT">
<input id="rate2" placeholder="Rate">

<input id="name3" placeholder="Material name">
<input id="sft3" placeholder="SFT">
<input id="rate3" placeholder="Rate">

<label>GST %</label>
<input id="gst">

<label>Loading</label>
<input id="loading">

<h3>RTGS Payments</h3>

<input id="rtgs1" placeholder="RTGS 1">
<input id="rtgs2" placeholder="RTGS 2">
<input id="rtgs3" placeholder="RTGS 3">

<button onclick="calculate()">Calculate</button>

<button onclick="download()">Download Bill Image</button>

</div>

<div id="bill" class="bill"></div>

<script>

function calculate(){

let totalsft = Number(document.getElementById("totalsft").value)

let sft1 = Number(document.getElementById("sft1").value)
let rate1 = Number(document.getElementById("rate1").value)

let sft2 = Number(document.getElementById("sft2").value)
let rate2 = Number(document.getElementById("rate2").value)

let sft3 = Number(document.getElementById("sft3").value)
let rate3 = Number(document.getElementById("rate3").value)

let gst = Number(document.getElementById("gst").value)

let loading = Number(document.getElementById("loading").value)

let rtgs1 = Number(document.getElementById("rtgs1").value)
let rtgs2 = Number(document.getElementById("rtgs2").value)
let rtgs3 = Number(document.getElementById("rtgs3").value)

let m1 = sft1 * rate1
let m2 = sft2 * rate2
let m3 = sft3 * rate3

let materialTotal = m1 + m2 + m3

let gstValue = materialTotal * gst / 100

let mining = totalsft * 7

let total = materialTotal + gstValue + mining + loading

let pending = total - rtgs1 - rtgs2 - rtgs3

document.getElementById("bill").innerHTML = `

${sft1} × ${rate1} = ${m1.toLocaleString()} <br>
${sft2} × ${rate2} = ${m2.toLocaleString()} <br>
${sft3} × ${rate3} = ${m3.toLocaleString()} <br><br>

Material Total = ${materialTotal.toLocaleString()} <br>

GST ${gst}% = ${gstValue.toLocaleString()} <br><br>

Mining <br>
${totalsft} × 7 = ${mining.toLocaleString()} <br><br>

Loading = ${loading.toLocaleString()} <br><br>

TOTAL = ${total.toLocaleString()} <br><br>

RTGS <br>
- ${rtgs1.toLocaleString()} <br>
- ${rtgs2.toLocaleString()} <br>
- ${rtgs3.toLocaleString()} <br><br>

<div class="total">
Pending = ${pending.toLocaleString()}
</div>

`

}

function download(){

html2canvas(document.querySelector("#bill")).then(canvas => {

let link = document.createElement("a")

link.download = "bill.png"

link.href = canvas.toDataURL()

link.click()

})

}

</script>

</body>
</html>
